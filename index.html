<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Deepgraph WebGPU</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background-color: #111;
        color: white;
        font-family: sans-serif;
      }
      #app {
        width: 100vw;
        height: 100vh;
      }
      #ui {
        position: absolute;
        top: 20px;
        left: 20px;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="ui">
      <h1>Deepgraph WebGPU</h1>
      <p>Initializing...</p>
      <button id="swap-palette-btn" style="
        background: rgba(255, 255, 255, 0.1); 
        color: white; 
        border: 1px solid rgba(255, 255, 255, 0.3); 
        padding: 8px 16px; 
        border-radius: 4px; 
        cursor: pointer; 
        font-family: monospace; 
        transition: background 0.2s;
        backdrop-filter: blur(4px);
        pointer-events: auto;
      " onmouseover="this.style.background='rgba(255, 255, 255, 0.2)'" onmouseout="this.style.background='rgba(255, 255, 255, 0.1)'" onclick="window.swapPalette()">Swap Palette (Warm)</button>
      <button id="swap-mode-btn" style="
        background: rgba(255, 255, 255, 0.1); 
        color: white; 
        border: 1px solid rgba(255, 255, 255, 0.3); 
        padding: 8px 16px; 
        border-radius: 4px; 
        cursor: pointer; 
        font-family: monospace; 
        transition: background 0.2s;
        backdrop-filter: blur(4px);
        pointer-events: auto;
        margin-left: 10px;
      " onmouseover="this.style.background='rgba(255, 255, 255, 0.2)'" onmouseout="this.style.background='rgba(255, 255, 255, 0.1)'" onclick="window.swapMode()">Mode: 2D</button>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
